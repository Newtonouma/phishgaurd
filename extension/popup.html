<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>PhishGuard</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      width: 320px; min-height: 200px;
      font-family: 'Segoe UI', Helvetica, Arial, sans-serif;
      background: #F5F6FA; color: #2D3748;
    }
    .header {
      background: #1A2332;
      padding: 14px 16px;
      display: flex; align-items: center; gap:10px;
    }
    .logo { font-size:20px; }
    .title { color:white; font-size:14px; font-weight:700; }
    .subtitle { color:#8B9BB4; font-size:10px; }
    .body { padding: 14px 16px; }
    .status-card {
      background: white;
      border: 1px solid #E2E8F0;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
    }
    .status-row {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 12px; color: #718096; margin-bottom: 6px;
    }
    .status-val { font-weight: 700; color: #2D3748; }
    .btn {
      width: 100%; background: #FF6B2B; color: white;
      border: none; border-radius: 8px; padding: 10px;
      font-size: 13px; font-weight: 700; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 6px;
      margin-bottom: 8px;
    }
    .btn:hover { background: #E55A1F; }
    .btn-secondary {
      background: #E2E8F0; color: #4A5568;
    }
    .btn-secondary:hover { background: #CBD5E0; }
    #status-msg {
      font-size: 11px; color: #A0AEC0; text-align:center; margin-top: 8px;
    }
    .footer {
      padding: 8px 16px; font-size: 10px; color:#A0AEC0;
      background: #F5F6FA; border-top: 1px solid #E2E8F0;
      text-align: right;
    }
    .dot { width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px; }
    .dot-green  { background:#28C76F; }
    .dot-red    { background:#EA5455; }
    .dot-yellow { background:#FF9F43; }
  </style>
</head>
<body>
  <div class="header">
    <span class="logo">🛡</span>
    <div>
      <div class="title">PhishGuard</div>
      <div class="subtitle">Phishing Awareness Chatbot</div>
    </div>
  </div>

  <div class="body">
    <div class="status-card">
      <div class="status-row">
        <span>API Status</span>
        <span class="status-val" id="api-status">
          <span class="dot dot-yellow"></span>Checking…
        </span>
      </div>
      <div class="status-row">
        <span>Auto-analyse</span>
        <label style="cursor:pointer">
          <input type="checkbox" id="auto-toggle" style="margin-right:4px">
          <span id="auto-label">On</span>
        </label>
      </div>
      <div class="status-row">
        <span>Current page</span>
        <span class="status-val" id="page-status">—</span>
      </div>
    </div>

    <button class="btn" id="analyse-btn">
      🔍 Analyse Current Email
    </button>
    <button class="btn btn-secondary" id="dashboard-btn">
      📊 Open Full Dashboard
    </button>

    <div id="status-msg">Open an email in Gmail to analyse</div>
  </div>

  <div class="footer">B01821745 | UWS MSc IT with Data Analytics</div>

  <script src="popup.js"></script>
</body>
</html>
